<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Praktikum 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body class="container mt-5">
<h2 class="mb-4">Daftar Pengguna</h2>
</body>
</html>
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title" id="formTitle">Tambah User</h5>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Nama</label>
                    <input type="text" id="userName" class="form-control" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Umur</label>
                    <input type="number" id="userAge" class="form-control" placeholder="Contoh: 20" required>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Simpan Data</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary ms-2" style="display:none;" onclick="resetForm()">Batal</button>
                </div>
            </div>
        </form>
    </div>
</div>
<div class="table-responsive">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID (Auto)</th>
            <th>Nama</th>
            <th>Umur</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
    </table>
</div>

<script>
    const apiUrl = '/api/users';
    let isUpdate = false;

    $(document).ready(function() {
        loadUsers();

        $('#userForm').submit(function(e) {
            e.preventDefault();
            const userData = {
                name: $('#userName').val(),
                age: parseInt($('#userAge').val())
            };

            if (isUpdate) {
                const id = $('#userId').val();
                updateUser(id, userData);
            } else {
                addUser(userData);
            }
        });
    });
</script>
